<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Newsletter | Dreck Suite</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
  --bg: #0d0d14;
  --surface: #13131d;
  --surface-2: #1a1a28;
  --surface-3: #222233;
  --border: #2a2a3d;
  --text: #e8e6e1;
  --text-dim: #8a8a9a;
  --text-muted: #5a5a6a;
  --gold: #d4aa4f;
  --gold-dim: rgba(212, 170, 79, 0.15);
  --green: #4ade80;
  --red: #f87171;
  --blue: #60a5fa;
  --purple: #a78bfa;
  --orange: #fb923c;
  --cyan: #22d3ee;
  --font-display: 'Cormorant Garamond', Georgia, serif;
  --font-body: 'Sora', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 13px;
  line-height: 1.5;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Atmospheric orbs */
body::before, body::after {
  content: '';
  position: fixed;
  border-radius: 50%;
  filter: blur(120px);
  opacity: 0.07;
  pointer-events: none;
  z-index: 0;
}
body::before {
  width: 600px; height: 600px;
  background: var(--gold);
  top: -200px; right: -100px;
}
body::after {
  width: 500px; height: 500px;
  background: #4a6fa5;
  bottom: -150px; left: -100px;
}

/* Grain overlay */
.grain {
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 9999;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 32px 24px;
  position: relative;
  z-index: 1;
}

/* Header */
.header {
  display: flex;
  align-items: baseline;
  gap: 16px;
  margin-bottom: 32px;
  border-bottom: 1px solid var(--border);
  padding-bottom: 16px;
}
.header h1 {
  font-family: var(--font-display);
  font-size: 28px;
  font-weight: 700;
  color: var(--gold);
  letter-spacing: 0.02em;
}
.header .meta {
  font-size: 11px;
  color: var(--text-muted);
  font-family: var(--font-mono);
}

/* Tabs */
.tabs {
  display: flex;
  gap: 4px;
  margin-bottom: 24px;
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  padding: 8px 16px;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-dim);
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s;
  font-family: var(--font-body);
}
.tab:hover { color: var(--text); }
.tab.active {
  color: var(--gold);
  border-bottom-color: var(--gold);
}

/* Tab content */
.tab-content { display: none; }
.tab-content.active { display: block; }

/* Stat cards row */
.stats-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 12px;
  margin-bottom: 24px;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px 16px;
}
.stat-card .label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  margin-bottom: 4px;
}
.stat-card .value {
  font-family: var(--font-mono);
  font-size: 22px;
  font-weight: 500;
  color: var(--text);
}
.stat-card .value.gold { color: var(--gold); }
.stat-card .sub {
  font-size: 10px;
  color: var(--text-dim);
  margin-top: 2px;
  font-family: var(--font-mono);
}

/* Tables */
.table-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}
table {
  width: 100%;
  border-collapse: collapse;
}
th {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  font-weight: 500;
  padding: 10px 14px;
  text-align: left;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  user-select: none;
  white-space: nowrap;
}
th:hover { color: var(--text-dim); }
th.num, td.num { text-align: right; }
td {
  padding: 9px 14px;
  border-bottom: 1px solid rgba(42, 42, 61, 0.5);
  font-size: 12px;
}
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(212, 170, 79, 0.03); }
td.mono {
  font-family: var(--font-mono);
  font-size: 12px;
}
td a {
  color: var(--gold);
  text-decoration: none;
}
td a:hover { text-decoration: underline; }

/* Charts */
.chart-container {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 20px;
  margin-bottom: 16px;
}
.chart-container h3 {
  font-family: var(--font-display);
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 16px;
}
.chart-box {
  position: relative;
  height: 280px;
}

/* Date range filter */
.range-filter {
  display: flex;
  gap: 4px;
  margin-bottom: 20px;
}
.range-btn {
  padding: 5px 12px;
  font-size: 11px;
  font-family: var(--font-mono);
  color: var(--text-dim);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.2s;
}
.range-btn:hover { color: var(--text); border-color: var(--text-dim); }
.range-btn.active {
  color: var(--gold);
  border-color: var(--gold);
  background: var(--gold-dim);
}

/* Device split bars */
.device-bar {
  display: flex;
  height: 28px;
  border-radius: 4px;
  overflow: hidden;
  margin-bottom: 8px;
}
.device-bar .seg {
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-family: var(--font-mono);
  color: var(--bg);
  font-weight: 500;
  min-width: 40px;
  transition: width 0.4s ease;
}
.device-bar .desktop { background: var(--blue); }
.device-bar .mobile { background: var(--purple); }
.device-bar .unknown { background: var(--surface-3); color: var(--text-dim); }

.device-legend {
  display: flex;
  gap: 16px;
  font-size: 10px;
  color: var(--text-dim);
  margin-bottom: 20px;
}
.device-legend span::before {
  content: '';
  display: inline-block;
  width: 8px; height: 8px;
  border-radius: 2px;
  margin-right: 4px;
  vertical-align: middle;
}
.device-legend .l-desktop::before { background: var(--blue); }
.device-legend .l-mobile::before { background: var(--purple); }
.device-legend .l-unknown::before { background: var(--surface-3); }

/* Send selector */
.send-select {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 6px 12px;
  border-radius: 4px;
  font-family: var(--font-mono);
  font-size: 11px;
  margin-bottom: 20px;
  max-width: 400px;
}

/* Section label */
.section-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  margin-bottom: 8px;
  margin-top: 20px;
}

/* Loading */
.loading {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-dim);
  font-family: var(--font-mono);
  font-size: 12px;
}

/* Empty state */
.empty {
  text-align: center;
  padding: 40px;
  color: var(--text-muted);
  font-size: 12px;
}
</style>
</head>
<body>
<div class="grain"></div>
<div class="container">

<div class="header">
  <h1>Newsletter</h1>
  <span class="meta" id="meta"></span>
</div>

<div class="tabs" id="tabs">
  <button class="tab active" data-tab="send">Yesterday's Send</button>
  <button class="tab" data-tab="articles">Article Clicks</button>
  <button class="tab" data-tab="trends">Trends</button>
  <button class="tab" data-tab="byline">Byline</button>
  <button class="tab" data-tab="top">Top Articles</button>
  <button class="tab" data-tab="health">Delivery Health</button>
</div>

<!-- Yesterday's Send -->
<div class="tab-content active" id="tab-send">
  <select class="send-select" id="sendSelector"></select>
  <div id="sendStats"></div>
</div>

<!-- Article Clicks -->
<div class="tab-content" id="tab-articles">
  <select class="send-select" id="articleSelector"></select>
  <div id="articleTable"></div>
</div>

<!-- Trends -->
<div class="tab-content" id="tab-trends">
  <div class="range-filter" id="trendRange"></div>
  <div class="chart-container">
    <h3>Open &amp; Click Rate</h3>
    <div class="chart-box"><canvas id="chartRates"></canvas></div>
  </div>
  <div class="chart-container">
    <h3>Unsubscribes per Send</h3>
    <div class="chart-box"><canvas id="chartUnsubs"></canvas></div>
  </div>
</div>

<!-- Byline -->
<div class="tab-content" id="tab-byline">
  <div class="range-filter" id="bylineRange"></div>
  <div id="bylineTable"></div>
</div>

<!-- Top Articles -->
<div class="tab-content" id="tab-top">
  <div class="range-filter" id="topRange"></div>
  <div id="topTable"></div>
</div>

<!-- Delivery Health -->
<div class="tab-content" id="tab-health">
  <div class="range-filter" id="healthRange"></div>
  <div class="chart-container">
    <h3>Delivery &amp; Bounce Rate</h3>
    <div class="chart-box"><canvas id="chartDelivery"></canvas></div>
  </div>
  <div class="chart-container">
    <h3>Spam Reports &amp; Contacts Lost</h3>
    <div class="chart-box"><canvas id="chartSpam"></canvas></div>
  </div>
</div>

</div>

<script>
// ---------------------------------------------------------------------------
// Data
// ---------------------------------------------------------------------------
let DATA = null;
let MENTIONS = null;
let charts = {};

const DATA_URL = 'newsletter-data.json';
const MENTIONS_URL = 'https://businessden.github.io/reputation/mentions-data.json';

async function loadData() {
  try {
    const resp = await fetch(DATA_URL);
    DATA = await resp.json();
  } catch (e) {
    document.querySelector('.container').innerHTML =
      '<div class="loading">Could not load newsletter-data.json</div>';
    return;
  }

  // Optionally load mentions data for cross-referencing
  try {
    const resp2 = await fetch(MENTIONS_URL);
    MENTIONS = await resp2.json();
  } catch (e) {
    MENTIONS = null;
  }

  init();
}

// ---------------------------------------------------------------------------
// Init
// ---------------------------------------------------------------------------
function init() {
  const sends = DATA.sends || [];
  if (!sends.length) {
    document.querySelector('.container').innerHTML =
      '<div class="loading">No newsletter data yet. Run the scraper first.</div>';
    return;
  }

  // Meta
  const meta = DATA.metadata || {};
  const gen = meta.generated ? new Date(meta.generated).toLocaleString() : '';
  document.getElementById('meta').textContent =
    `${sends.length} sends tracked · updated ${gen}`;

  // Tabs
  document.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      document.getElementById('tab-' + t.dataset.tab).classList.add('active');
    });
  });

  // Send selector
  buildSendSelector('sendSelector', renderSend);
  buildSendSelector('articleSelector', renderArticles);

  // Range filters
  buildRangeFilter('trendRange', [30, 60, 90], renderTrends);
  buildRangeFilter('bylineRange', [30, 60, 90], renderByline);
  buildRangeFilter('topRange', [30, 60, 90], renderTop);
  buildRangeFilter('healthRange', [30, 60, 90], renderHealth);

  // Initial renders
  renderSend(0);
  renderArticles(0);
  renderTrends(30);
  renderByline(30);
  renderTop(30);
  renderHealth(30);
}

// ---------------------------------------------------------------------------
// Helpers
// ---------------------------------------------------------------------------
function fmt(n) {
  if (n === undefined || n === null) return '—';
  return n.toLocaleString();
}
function pct(n) {
  if (n === undefined || n === null) return '—';
  return n.toFixed(1) + '%';
}

function buildSendSelector(elId, callback) {
  const sel = document.getElementById(elId);
  DATA.sends.forEach((s, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = `${s.date} — ${s.name}`;
    sel.appendChild(opt);
  });
  sel.addEventListener('change', () => callback(parseInt(sel.value)));
}

function buildRangeFilter(elId, ranges, callback) {
  const el = document.getElementById(elId);
  ranges.forEach((d, i) => {
    const btn = document.createElement('button');
    btn.className = 'range-btn' + (i === 0 ? ' active' : '');
    btn.textContent = d + 'd';
    btn.addEventListener('click', () => {
      el.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      callback(d);
    });
    el.appendChild(btn);
  });
}

function getSendsInRange(days) {
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - days);
  const cutStr = cutoff.toISOString().slice(0, 10);
  return DATA.sends.filter(s => s.date >= cutStr).reverse(); // chronological
}

function lookupArticle(url) {
  if (!MENTIONS) return null;
  const articles = MENTIONS.bd_articles || [];
  const clean = url.replace(/\/$/, '');
  return articles.find(a => a.url && a.url.replace(/\/$/, '') === clean) || null;
}

function lookupGA4(url) {
  if (!MENTIONS || !MENTIONS.ga4 || !MENTIONS.ga4.article_stats) return null;
  const clean = url.replace(/\/$/, '');
  const stats = MENTIONS.ga4.article_stats;
  // Try with and without trailing slash
  return stats[clean] || stats[clean + '/'] || stats[url] || null;
}

function destroyChart(key) {
  if (charts[key]) {
    charts[key].destroy();
    delete charts[key];
  }
}

const chartDefaults = {
  responsive: true,
  maintainAspectRatio: false,
  plugins: {
    legend: {
      labels: {
        color: '#8a8a9a',
        font: { family: "'Sora', sans-serif", size: 11 },
        boxWidth: 12,
        padding: 16,
      },
    },
    tooltip: {
      backgroundColor: '#1a1a28',
      titleColor: '#e8e6e1',
      bodyColor: '#8a8a9a',
      borderColor: '#2a2a3d',
      borderWidth: 1,
      titleFont: { family: "'Sora', sans-serif", size: 12 },
      bodyFont: { family: "'JetBrains Mono', monospace", size: 11 },
      padding: 10,
    },
  },
  scales: {
    x: {
      ticks: { color: '#5a5a6a', font: { family: "'JetBrains Mono', monospace", size: 10 } },
      grid: { color: 'rgba(42,42,61,0.4)', drawBorder: false },
    },
    y: {
      ticks: { color: '#5a5a6a', font: { family: "'JetBrains Mono', monospace", size: 10 } },
      grid: { color: 'rgba(42,42,61,0.4)', drawBorder: false },
    },
  },
};

// ---------------------------------------------------------------------------
// Tab: Yesterday's Send
// ---------------------------------------------------------------------------
function renderSend(idx) {
  const s = DATA.sends[idx];
  if (!s) return;

  const openTotal = (s.device_opens || {});
  const clickTotal = (s.device_clicks || {});
  const openSum = (openTotal.computer || 0) + (openTotal.mobile || 0) + (openTotal.unknown || 0);
  const clickSum = (clickTotal.computer || 0) + (clickTotal.mobile || 0) + (clickTotal.unknown || 0);

  let html = `
    <div class="stats-row">
      <div class="stat-card">
        <div class="label">Recipients</div>
        <div class="value">${fmt(s.recipients)}</div>
        <div class="sub">${fmt(s.delivered)} delivered</div>
      </div>
      <div class="stat-card">
        <div class="label">Open Rate</div>
        <div class="value gold">${pct(s.open_rate)}</div>
        <div class="sub">${fmt(s.opens)} opens</div>
      </div>
      <div class="stat-card">
        <div class="label">Click Rate</div>
        <div class="value gold">${pct(s.click_rate)}</div>
        <div class="sub">${fmt(s.clicks)} clicks</div>
      </div>
      <div class="stat-card">
        <div class="label">CTR</div>
        <div class="value">${pct(s.click_through_rate)}</div>
        <div class="sub">clicks / opens</div>
      </div>
      <div class="stat-card">
        <div class="label">Bounces</div>
        <div class="value">${fmt(s.bounces)}</div>
        <div class="sub">${s.hard_bounces} hard · ${s.soft_bounces} soft</div>
      </div>
      <div class="stat-card">
        <div class="label">Unsubscribes</div>
        <div class="value">${fmt(s.unsubscribes)}</div>
        <div class="sub">${fmt(s.spam_reports)} spam reports</div>
      </div>
    </div>
  `;

  // Device split
  if (openSum > 0) {
    const opct = k => ((openTotal[k] || 0) / openSum * 100);
    const cpct = k => clickSum ? ((clickTotal[k] || 0) / clickSum * 100) : 0;

    html += `
      <div class="section-label">Device Split — Opens</div>
      <div class="device-bar">
        <div class="seg desktop" style="width:${opct('computer')}%">${opct('computer').toFixed(0)}%</div>
        <div class="seg mobile" style="width:${opct('mobile')}%">${opct('mobile').toFixed(0)}%</div>
        ${openTotal.unknown ? `<div class="seg unknown" style="width:${opct('unknown')}%">${opct('unknown').toFixed(0)}%</div>` : ''}
      </div>
      <div class="section-label">Device Split — Clicks</div>
      <div class="device-bar">
        <div class="seg desktop" style="width:${cpct('computer')}%">${cpct('computer').toFixed(0)}%</div>
        <div class="seg mobile" style="width:${cpct('mobile')}%">${cpct('mobile').toFixed(0)}%</div>
        ${clickTotal.unknown ? `<div class="seg unknown" style="width:${cpct('unknown')}%">${cpct('unknown').toFixed(0)}%</div>` : ''}
      </div>
      <div class="device-legend">
        <span class="l-desktop">Desktop</span>
        <span class="l-mobile">Mobile</span>
        <span class="l-unknown">Unknown</span>
      </div>
    `;
  }

  document.getElementById('sendStats').innerHTML = html;
}

// ---------------------------------------------------------------------------
// Tab: Article Clicks
// ---------------------------------------------------------------------------
function renderArticles(idx) {
  const s = DATA.sends[idx];
  if (!s || !s.articles || !s.articles.length) {
    document.getElementById('articleTable').innerHTML = '<div class="empty">No article click data for this send.</div>';
    return;
  }

  let rows = s.articles.map(a => {
    const ga4 = lookupGA4(a.url);
    const meta = lookupArticle(a.url);
    const title = (meta && meta.title) ? meta.title : a.title;
    const author = (meta && meta.author) ? meta.author : '';
    const views = ga4 ? ga4.views || ga4.pageviews || 0 : null;
    const nlShare = (views && views > 0) ? (a.clicks / views * 100).toFixed(1) + '%' : '—';

    return `<tr>
      <td><a href="${a.url}" target="_blank">${title}</a>${author ? `<br><span style="color:var(--text-muted);font-size:10px">${author}</span>` : ''}</td>
      <td class="num mono">${fmt(a.clicks)}</td>
      <td class="num mono">${pct(a.click_pct)}</td>
      <td class="num mono">${views !== null ? fmt(views) : '—'}</td>
      <td class="num mono">${nlShare}</td>
    </tr>`;
  }).join('');

  document.getElementById('articleTable').innerHTML = `
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>Article</th>
          <th class="num">NL Clicks</th>
          <th class="num">Click %</th>
          <th class="num">GA4 Views</th>
          <th class="num">NL Share</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
}

// ---------------------------------------------------------------------------
// Tab: Trends
// ---------------------------------------------------------------------------
function renderTrends(days) {
  const sends = getSendsInRange(days);
  if (!sends.length) return;

  const labels = sends.map(s => s.date.slice(5)); // MM-DD

  destroyChart('rates');
  charts.rates = new Chart(document.getElementById('chartRates'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: 'Open Rate %',
          data: sends.map(s => s.open_rate),
          borderColor: '#d4aa4f',
          backgroundColor: 'rgba(212,170,79,0.1)',
          borderWidth: 2,
          pointRadius: days > 60 ? 0 : 3,
          tension: 0.3,
          fill: true,
        },
        {
          label: 'Click Rate %',
          data: sends.map(s => s.click_rate),
          borderColor: '#60a5fa',
          backgroundColor: 'rgba(96,165,250,0.1)',
          borderWidth: 2,
          pointRadius: days > 60 ? 0 : 3,
          tension: 0.3,
          fill: true,
        },
      ],
    },
    options: chartDefaults,
  });

  destroyChart('unsubs');
  charts.unsubs = new Chart(document.getElementById('chartUnsubs'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: 'Unsubscribes',
        data: sends.map(s => s.unsubscribes),
        backgroundColor: 'rgba(248,113,113,0.6)',
        borderColor: '#f87171',
        borderWidth: 1,
        borderRadius: 3,
      }],
    },
    options: chartDefaults,
  });
}

// ---------------------------------------------------------------------------
// Tab: Byline
// ---------------------------------------------------------------------------
function renderByline(days) {
  const sends = getSendsInRange(days);
  const byAuthor = {};

  sends.forEach(s => {
    (s.articles || []).forEach(a => {
      const meta = lookupArticle(a.url);
      const author = (meta && meta.author) ? meta.author : 'Unknown';
      if (!byAuthor[author]) byAuthor[author] = { clicks: 0, articles: 0 };
      byAuthor[author].clicks += a.clicks;
      byAuthor[author].articles += 1;
    });
  });

  const sorted = Object.entries(byAuthor).sort((a, b) => b[1].clicks - a[1].clicks);

  if (!sorted.length) {
    document.getElementById('bylineTable').innerHTML =
      '<div class="empty">No byline data available. Requires cross-reference with Reputation tool.</div>';
    return;
  }

  const rows = sorted.map(([author, d]) =>
    `<tr>
      <td>${author}</td>
      <td class="num mono">${fmt(d.clicks)}</td>
      <td class="num mono">${d.articles}</td>
      <td class="num mono">${(d.clicks / d.articles).toFixed(0)}</td>
    </tr>`
  ).join('');

  document.getElementById('bylineTable').innerHTML = `
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>Reporter</th>
          <th class="num">Total Clicks</th>
          <th class="num">Articles</th>
          <th class="num">Avg Clicks</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
}

// ---------------------------------------------------------------------------
// Tab: Top Articles
// ---------------------------------------------------------------------------
function renderTop(days) {
  const sends = getSendsInRange(days);
  const byUrl = {};

  sends.forEach(s => {
    (s.articles || []).forEach(a => {
      const key = a.url;
      if (!byUrl[key]) byUrl[key] = { url: a.url, title: a.title, clicks: 0, sends: 0 };
      byUrl[key].clicks += a.clicks;
      byUrl[key].sends += 1;
    });
  });

  const sorted = Object.values(byUrl).sort((a, b) => b.clicks - a.clicks).slice(0, 30);

  if (!sorted.length) {
    document.getElementById('topTable').innerHTML = '<div class="empty">No article data in this range.</div>';
    return;
  }

  const rows = sorted.map((a, i) => {
    const meta = lookupArticle(a.url);
    const title = (meta && meta.title) ? meta.title : a.title;
    return `<tr>
      <td class="mono" style="color:var(--text-muted);width:30px">${i + 1}</td>
      <td><a href="${a.url}" target="_blank">${title}</a></td>
      <td class="num mono">${fmt(a.clicks)}</td>
    </tr>`;
  }).join('');

  document.getElementById('topTable').innerHTML = `
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>#</th>
          <th>Article</th>
          <th class="num">NL Clicks</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
}

// ---------------------------------------------------------------------------
// Tab: Delivery Health
// ---------------------------------------------------------------------------
function renderHealth(days) {
  const sends = getSendsInRange(days);
  if (!sends.length) return;

  const labels = sends.map(s => s.date.slice(5));

  destroyChart('delivery');
  charts.delivery = new Chart(document.getElementById('chartDelivery'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: 'Delivered',
          data: sends.map(s => s.delivered),
          borderColor: '#4ade80',
          borderWidth: 2,
          pointRadius: days > 60 ? 0 : 3,
          tension: 0.3,
          yAxisID: 'y',
        },
        {
          label: 'Bounces',
          data: sends.map(s => s.bounces),
          borderColor: '#f87171',
          borderWidth: 2,
          pointRadius: days > 60 ? 0 : 3,
          tension: 0.3,
          yAxisID: 'y1',
        },
      ],
    },
    options: {
      ...chartDefaults,
      scales: {
        ...chartDefaults.scales,
        y: {
          ...chartDefaults.scales.y,
          position: 'left',
        },
        y1: {
          ...chartDefaults.scales.y,
          position: 'right',
          grid: { drawOnChartArea: false },
        },
      },
    },
  });

  destroyChart('spam');
  charts.spam = new Chart(document.getElementById('chartSpam'), {
    type: 'bar',
    data: {
      labels,
      datasets: [
        {
          label: 'Spam Reports',
          data: sends.map(s => s.spam_reports),
          backgroundColor: 'rgba(251,146,60,0.6)',
          borderColor: '#fb923c',
          borderWidth: 1,
          borderRadius: 3,
        },
        {
          label: 'Contacts Lost',
          data: sends.map(s => s.contacts_lost),
          backgroundColor: 'rgba(248,113,113,0.4)',
          borderColor: '#f87171',
          borderWidth: 1,
          borderRadius: 3,
        },
      ],
    },
    options: chartDefaults,
  });
}

// ---------------------------------------------------------------------------
// Boot
// ---------------------------------------------------------------------------
loadData();
</script>

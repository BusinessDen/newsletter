name: Explore HubSpot API

on:
  workflow_dispatch:

jobs:
  explore:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run exploration scraper
        env:
          HUBSPOT_TOKEN: ${{ secrets.HUBSPOT_TOKEN }}
        run: python scrape_explore.py

      - name: Upload output
        uses: actions/upload-artifact@v4
        with:
          name: hubspot-exploration-${{ github.run_id }}
          path: raw_output/
          retention-days: 7
